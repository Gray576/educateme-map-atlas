<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SEMrush DOM Capture</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 12px;
        width: 320px;
        color: #111827;
      }

      h1 {
        font-size: 15px;
        margin: 0 0 8px;
      }

      .meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin: 0 0 10px;
      }

      .version {
        font-size: 11px;
        color: #6b7280;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      p {
        font-size: 12px;
        line-height: 1.4;
        margin: 0 0 10px;
        color: #4b5563;
      }

      .actions {
        display: grid;
        gap: 8px;
        margin-bottom: 12px;
      }

      button {
        border: 1px solid #d1d5db;
        border-radius: 8px;
        background: white;
        padding: 10px 12px;
        font-size: 13px;
        text-align: left;
        cursor: pointer;
      }

      button:hover {
        background: #f9fafb;
      }

      #status {
        white-space: pre-wrap;
        font-size: 12px;
        line-height: 1.4;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <div class="meta">
      <h1>SEMrush DOM Capture</h1>
      <div class="version" id="version">v?</div>
    </div>
    <p>Capture the current SEMrush page into raw JSON. Use reload capture if you want network payloads from page load.</p>

    <div class="actions">
      <button id="capture-current">Capture current page</button>
      <button id="capture-reload">Reload page, then capture</button>
      <button id="clear-summary">Clear last summary</button>
    </div>

    <div id="status">Ready.</div>

    <script src="popup.js"></script>
  </body>
  </html>
